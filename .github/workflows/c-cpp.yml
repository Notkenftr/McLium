name: C/C++ CI with Aoko Sync

on:
  push:
    branches: ["main", "Aoko"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            cmake g++ python3 python3-dev python3-pip \
            pybind11-dev

      - name: Configure
        run: cmake -S ./aoko -B build

      - name: Build
        run: cmake --build build -j

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aoko-build
          path: build/*.so

      - name: Sync Aoko and libs to main branch
        if: github.ref == 'refs/heads/Aoko' && github.event_name == 'push'
        run: |
          git clone --branch main https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main_repo
          
          rm -rf main_repo/aoko
          mkdir -p main_repo/aoko
          rsync -av --exclude=main_repo --exclude=.git --exclude=build ./ main_repo/aoko/
          
          rm -rf main_repo/libs
          mkdir -p main_repo/libs
          cp build/*.so main_repo/libs/
          
          echo "Cấu trúc thư mục main_repo hiện tại:"
          ls -lah main_repo
          ls -lah main_repo/libs
          
          cd main_repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add aoko libs
          
          git diff-index --quiet HEAD || git commit -m "Chore: Auto-build C++ & sync code to /aoko, libs to /libs"
          git push origin main