name: pip-audit_check.yml
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  pip-audit_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          pip install -r ./requirements.txt
          pip install pip-audit
      - name: pip-audit check
        run: |
          pip-audit
          pip-audit -f json